name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci || npm install
      - run: npm run lint
      - run: npm test

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest
      - run: pytest tests/ -q

  ml-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r ml/requirements.txt
      - run: python ml/scripts/generate_synthetic_dataset.py --signs 10 --clips-per-sign 20
      - run: python ml/train.py --epochs 2 --model-version ci
      - run: python ml/export_onnx.py --checkpoint ml/checkpoints/ci/best.pt
      - run: python ml/eval.py --checkpoint ml/checkpoints/ci/best.pt
