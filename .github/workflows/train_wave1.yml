name: Train Wave 1

# Manual training run on a GitHub-hosted runner. Produces:
#   - ml/exports/model.onnx (uploaded as a release asset)
#   - ml/exports/labels.json
#   - ml/exports/model_meta.json
#   - docs/VALIDATION_REPORT.md (auto-metrics block populated)
#
# No CUDA / GPU required: the SignClipCNN3D is small enough to train on
# the standard 4-core / 7 GB / 14 GB-disk ubuntu-latest runner.
#
# Inputs:
#   - dataset_source: "learner_samples" (committed 25 webms, tiny smoke), or
#                     "semlex" (downloads Sem-Lex via fetch_semlex.py), or
#                     "both" (combines them).
#   - semlex_splits: comma-separated subset of {train,val,test}. Default "val"
#                    is smallest and fastest for a first end-to-end run. Use
#                    "train,val,test" for the full dataset (much larger).
#
# Required secret for Sem-Lex paths — EITHER of:
#   - SEMLEX_DATA_URLS  (preferred): JSON dict of direct HTTPS URLs, e.g. to a
#     Hugging Face Hub dataset mirror. No quota. See scripts/mirror_drive_to_hf.py
#     for a one-time mirror helper and docs/MIRRORING_SEMLEX.md for the walkthrough.
#   - SEMLEX_DRIVE_FILES: JSON dict of Google Drive file IDs from Sem-Lex.
#     Subject to Drive's per-file daily download quota; OK for the first run
#     but flaky for iteration.
# Both have the same shape: {"metadata":"<id-or-url>","train":...,"val":...,"test":...}
# `metadata` is required; train/val/test are optional and download is
# gated by the `semlex_splits` workflow input.
# Add at: repo Settings → Secrets and variables → Actions → New secret.
# SEMLEX_DATA_URLS wins if both are set.

env:
  # Opt actions/checkout, actions/setup-python, actions/cache, etc. into Node 24
  # ahead of GitHub's 2026-06-02 forced flip. Removes the deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      dataset_source:
        description: "Where the training data comes from"
        type: choice
        options:
          - learner_samples
          - semlex
          - both
        default: learner_samples
      semlex_splits:
        description: "Which Sem-Lex splits to pull (csv of train/val/test). 'val' is smallest."
        type: string
        default: val
      semlex_clips_per_sign:
        description: "Cap per sign when pulling from Sem-Lex (ignored otherwise)"
        type: number
        default: 50
      include_asl_citizen:
        description: "Add targeted ASL Citizen clips via remote ZIP range extraction"
        type: boolean
        default: false
      asl_citizen_signs:
        description: "Comma-separated signs to pull from ASL Citizen; blank means Wave 1"
        type: string
        default: "four,who,goodbye,how,deaf,hello,please,thank_you,sorry,no,yes,three"
      asl_citizen_clips_per_sign:
        description: "Cap per sign when pulling ASL Citizen"
        type: number
        default: 30
      asl_citizen_splits:
        description: "Which ASL Citizen splits to pull"
        type: string
        default: "train,val,test"
      epochs:
        description: "Training epochs"
        type: number
        default: 20
      learning_rate:
        description: "Adam learning rate passed to ml/train.py"
        type: string
        default: "0.001"
      weight_decay:
        description: "Adam weight decay passed to ml/train.py"
        type: string
        default: "0.0001"
      label_smoothing:
        description: "Cross-entropy label smoothing passed to ml/train.py"
        type: string
        default: "0.05"
      max_grad_norm:
        description: "Gradient clipping norm; 0 disables clipping"
        type: string
        default: "1.0"
      min_feature_coverage:
        description: "Minimum hand-landmark frame coverage for training clips; 0 keeps all extracted clips"
        type: string
        default: "0.20"
      early_stop_patience:
        description: "Epochs without val improvement before stopping; 0 disables"
        type: number
        default: 4
      model_size:
        description: "Model capacity/architecture"
        type: choice
        options:
          - small
          - default
          - frame
          - tcn
          - motion_tcn
          - hand_landmark_tcn
        default: small
      preprocess:
        description: "Raw video resize mode before training"
        type: choice
        options:
          - center_crop
          - letterbox
        default: center_crop
      model_version:
        description: "Model version tag (also used for release tag)"
        type: string
        default: wave1-ci-v1
      run_overfit_probe:
        description: "Before full training, verify the model can memorize a tiny subset"
        type: boolean
        default: true
      probe_only:
        description: "Stop after the manifest summary and memorization probe; do not train/export/release"
        type: boolean
        default: false

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create a release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - name: Install MediaPipe runtime libs
        if: inputs.model_size == 'hand_landmark_tcn'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgles2

      - name: Install ML deps (CPU torch, smaller than default CUDA build)
        run: |
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r ml/requirements.txt

      - name: Stage learner_samples (if requested)
        if: inputs.dataset_source == 'learner_samples' || inputs.dataset_source == 'both'
        run: |
          mkdir -p ml/data/incoming
          cp ml/data/learner_samples/signer_a/*.webm ml/data/incoming/
          echo "Staged $(ls ml/data/incoming/*.webm | wc -l) learner webms"

      - name: Sanitize cache key components
        # actions/cache@v4 rejects keys containing commas. The semlex_splits
        # input is comma-separated (e.g. "train,val,test") so we substitute
        # to hyphens here and reference the safe form in the cache key below.
        if: inputs.dataset_source == 'semlex' || inputs.dataset_source == 'both'
        env:
          SEMLEX_SPLITS: ${{ inputs.semlex_splits }}
        run: |
          splits_safe=$(printf '%s' "$SEMLEX_SPLITS" | tr ',' '-')
          echo "SEMLEX_SPLITS_SAFE=$splits_safe" >> "$GITHUB_ENV"

      - name: Cache Sem-Lex extracted videos
        if: inputs.dataset_source == 'semlex' || inputs.dataset_source == 'both'
        uses: actions/cache@v4
        with:
          # Cache the already-extracted per-sign videos (small: ~1–2 GB),
          # not the multi-GB raw tarballs (which we stream-extract and delete).
          # Bump the `fmtv*` suffix when changing the filename format produced
          # by fetch_semlex.py so old caches with stale filenames don't restore.
          path: ml/data/incoming
          key: semlex-fmtv2-${{ hashFiles('content/wave1_signs.csv') }}-${{ env.SEMLEX_SPLITS_SAFE }}-${{ inputs.semlex_clips_per_sign }}

      - name: Subset Sem-Lex source JSON to the requested splits
        if: inputs.dataset_source == 'semlex' || inputs.dataset_source == 'both'
        id: subset_drive
        env:
          SEMLEX_DATA_URLS: ${{ secrets.SEMLEX_DATA_URLS }}
          SEMLEX_DRIVE_FILES: ${{ secrets.SEMLEX_DRIVE_FILES }}
          SPLITS: ${{ inputs.semlex_splits }}
        run: |
          # Pick whichever secret is set — SEMLEX_DATA_URLS (HF Hub mirror,
          # preferred) wins over SEMLEX_DRIVE_FILES (Drive, quota-limited).
          if [ -n "$SEMLEX_DATA_URLS" ]; then
            echo "Using SEMLEX_DATA_URLS (direct HTTPS, recommended)"
            SOURCE_JSON="$SEMLEX_DATA_URLS"
            MODE="urls"
          elif [ -n "$SEMLEX_DRIVE_FILES" ]; then
            echo "Using SEMLEX_DRIVE_FILES (Drive IDs, subject to daily quota)"
            SOURCE_JSON="$SEMLEX_DRIVE_FILES"
            MODE="drive"
          else
            echo "ERROR: neither SEMLEX_DATA_URLS nor SEMLEX_DRIVE_FILES secret is set." >&2
            echo "Add at: repo Settings → Secrets and variables → Actions." >&2
            echo "Preferred (no quota): mirror to HF Hub via scripts/mirror_drive_to_hf.py" >&2
            exit 1
          fi
          # Filter to {metadata, <requested splits>} so the fetcher doesn't try
          # to download splits we didn't ask for.
          export SOURCE_JSON MODE
          python <<'PY' > subset.json
          import json, os
          full = json.loads(os.environ["SOURCE_JSON"])
          if "metadata" not in full:
              raise SystemExit(f"{os.environ['MODE']} secret missing required 'metadata' key")
          out = {"metadata": full["metadata"]}
          for split in [s.strip() for s in os.environ["SPLITS"].split(",") if s.strip()]:
              if split not in {"train", "val", "test"}:
                  raise SystemExit(f"Unknown split {split!r}; must be one of train/val/test")
              if split not in full:
                  raise SystemExit(f"Requested split {split!r} but no entry in source secret")
              out[split] = full[split]
          print(json.dumps(out))
          PY
          {
            echo "subset=$(cat subset.json)"
            echo "mode=$MODE"
          } >> "$GITHUB_OUTPUT"

      - name: Fetch Sem-Lex (stream-extract only matched videos; skips poses/*.tar.gz)
        if: inputs.dataset_source == 'semlex' || inputs.dataset_source == 'both'
        env:
          # fetch_semlex.py reads whichever of these is non-empty.
          # subset.outputs.mode tells us which variable to populate.
          SEMLEX_DATA_URLS: ${{ steps.subset_drive.outputs.mode == 'urls' && steps.subset_drive.outputs.subset || '' }}
          SEMLEX_DRIVE_FILES: ${{ steps.subset_drive.outputs.mode == 'drive' && steps.subset_drive.outputs.subset || '' }}
          SEMLEX_CLIPS_PER_SIGN: ${{ inputs.semlex_clips_per_sign }}
        run: python ml/scripts/fetch_semlex.py

      - name: Fetch ASL Citizen supplement
        if: inputs.include_asl_citizen
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python ml/scripts/fetch_asl_citizen.py \
            --signs "${{ inputs.asl_citizen_signs }}" \
            --splits "${{ inputs.asl_citizen_splits }}" \
            --clips-per-sign ${{ inputs.asl_citizen_clips_per_sign }} \
            --out-dir ml/data/incoming

      - name: Show staged video summary
        run: |
          echo "ml/data/incoming/ contents:"
          ls ml/data/incoming/ | head -30 || true
          echo "Total staged: $(ls ml/data/incoming/ | wc -l)"

      - name: Decode videos → .npz
        run: python ml/scripts/import_captures.py --resize-mode ${{ inputs.preprocess }}

      - name: Build manifest (signer-disjoint when ≥3 signers, else random split)
        run: python ml/scripts/build_manifest.py --wave1 --signer-disjoint

      - name: Dataset summary
        run: |
          python -c "
          import json
          from collections import Counter
          with open('ml/data/manifest.json') as f:
              m = json.load(f)
          splits = Counter(c['split'] for c in m['clips'])
          per_sign = Counter(c['sign_id'] for c in m['clips'])
          print(f'Total clips: {len(m[\"clips\"])}')
          print(f'Splits: {dict(splits)}')
          print(f'Classes with data: {len(per_sign)}/{len(m[\"sign_ids\"])}')
          for s in sorted(per_sign):
              print(f'  {s:20s} {per_sign[s]}')
          "

      - name: Manifest coverage report
        run: |
          python ml/scripts/manifest_report.py \
            --manifest ml/data/manifest.json \
            --out-json ml/exports/manifest_report.json

      - name: Visual QA contact sheets
        run: |
          python ml/scripts/make_contact_sheets.py \
            --manifest ml/data/manifest.json \
            --video-dir ml/data/incoming \
            --out-dir ml/reports/contact_sheets \
            --split test \
            --max-signs 25 \
            --clips-per-sign 2 \
            --frames-per-clip 6

      - name: Upload diagnostic artifacts
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ inputs.model_version }}
          path: |
            ml/exports/manifest_report.json
            ml/reports/contact_sheets/*.jpg
          retention-days: 30

      - name: Tiny memorization probe
        if: inputs.run_overfit_probe && (inputs.dataset_source == 'semlex' || inputs.dataset_source == 'both') && inputs.model_size != 'hand_landmark_tcn'
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python ml/scripts/overfit_probe.py \
            --manifest ml/data/manifest.json \
            --split train \
            --samples-per-class 2 \
            --max-classes 10 \
            --epochs 40 \
            --batch-size 8 \
            --model-size small \
            --disable-dropout \
            --pass-threshold 0.90

      - name: Extract MediaPipe hand landmarks
        if: ${{ !inputs.probe_only && inputs.model_size == 'hand_landmark_tcn' }}
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python ml/scripts/extract_hand_landmarks.py \
            --manifest ml/data/manifest.json \
            --out-dir ml/data/hand_landmarks

      - name: Train
        if: ${{ !inputs.probe_only && inputs.model_size != 'hand_landmark_tcn' }}
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python ml/train.py \
            --manifest ml/data/manifest.json \
            --epochs ${{ inputs.epochs }} \
            --model-version ${{ inputs.model_version }} \
            --model-size ${{ inputs.model_size }} \
            --lr ${{ inputs.learning_rate }} \
            --weight-decay ${{ inputs.weight_decay }} \
            --label-smoothing ${{ inputs.label_smoothing }} \
            --max-grad-norm ${{ inputs.max_grad_norm }} \
            --early-stop-patience ${{ inputs.early_stop_patience }} \
            --preprocess ${{ inputs.preprocess }}

      - name: Train hand-landmark model
        if: ${{ !inputs.probe_only && inputs.model_size == 'hand_landmark_tcn' }}
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python ml/train_landmarks.py \
            --manifest ml/data/manifest.json \
            --feature-dir ml/data/hand_landmarks \
            --epochs ${{ inputs.epochs }} \
            --model-version ${{ inputs.model_version }} \
            --lr ${{ inputs.learning_rate }} \
            --weight-decay ${{ inputs.weight_decay }} \
            --label-smoothing ${{ inputs.label_smoothing }} \
            --max-grad-norm ${{ inputs.max_grad_norm }} \
            --min-feature-coverage ${{ inputs.min_feature_coverage }} \
            --early-stop-patience ${{ inputs.early_stop_patience }}

      - name: Evaluate (populates VALIDATION_REPORT auto-metrics block)
        if: ${{ !inputs.probe_only && inputs.model_size != 'hand_landmark_tcn' }}
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python ml/eval.py \
            --checkpoint ml/checkpoints/${{ inputs.model_version }}/best.pt \
            --manifest ml/data/manifest.json

      - name: Evaluate hand-landmark model
        if: ${{ !inputs.probe_only && inputs.model_size == 'hand_landmark_tcn' }}
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python ml/eval_landmarks.py \
            --checkpoint ml/checkpoints/${{ inputs.model_version }}/best.pt \
            --manifest ml/data/manifest.json \
            --feature-dir ml/data/hand_landmarks

      - name: Build recognition calibration
        if: ${{ !inputs.probe_only }}
        env:
          PYTHONIOENCODING: utf-8
        run: python ml/scripts/build_recognition_calibration.py

      - name: Build targeted capture plan
        if: ${{ !inputs.probe_only }}
        env:
          PYTHONIOENCODING: utf-8
        run: python ml/scripts/build_capture_plan.py --out ml/exports/capture_plan.md

      - name: Export ONNX
        if: ${{ !inputs.probe_only && inputs.model_size != 'hand_landmark_tcn' }}
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python ml/export_onnx.py \
            --checkpoint ml/checkpoints/${{ inputs.model_version }}/best.pt
          ls -lh ml/exports/

      - name: Export hand-landmark ONNX
        if: ${{ !inputs.probe_only && inputs.model_size == 'hand_landmark_tcn' }}
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python ml/export_landmark_onnx.py \
            --checkpoint ml/checkpoints/${{ inputs.model_version }}/best.pt
          ls -lh ml/exports/

      - name: Upload artifacts (always)
        if: ${{ !inputs.probe_only }}
        uses: actions/upload-artifact@v4
        with:
          name: model-${{ inputs.model_version }}
          path: |
            ml/exports/model.onnx
            ml/exports/labels.json
            ml/exports/model_meta.json
            ml/exports/eval_metrics.json
            ml/exports/recognition_calibration.json
            ml/exports/capture_plan.md
            ml/exports/manifest_report.json
            ml/reports/contact_sheets/*.jpg
            docs/VALIDATION_REPORT.md
          retention-days: 30

      - name: Publish GitHub Release
        if: ${{ !inputs.probe_only }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.model_version }}
          name: "Model ${{ inputs.model_version }}"
          body: |
            Trained from scratch on dataset source: `${{ inputs.dataset_source }}`.
            Sem-Lex splits used: `${{ inputs.semlex_splits }}`.
            Epochs: ${{ inputs.epochs }}.
            Model size: `${{ inputs.model_size }}`.
            Preprocess: `${{ inputs.preprocess }}`.
            Learning rate: `${{ inputs.learning_rate }}`.
            Weight decay: `${{ inputs.weight_decay }}`.
            Label smoothing: `${{ inputs.label_smoothing }}`.
            Max grad norm: `${{ inputs.max_grad_norm }}`.

            ## Files
            - `model.onnx` — drop into `apps/web/public/models/`
            - `labels.json` — drop into `apps/web/public/models/`
            - `model_meta.json` — drop into `apps/web/public/models/`
            - `eval_metrics.json` — raw classification report + accuracy
            - `recognition_calibration.json` — per-sign thresholds + targeted confusion hints
            - `capture_plan.md` — ranked next-recording plan based on weak signs and learner clips
            - `manifest_report.json` — split/sign/signer coverage diagnostics
            - `contact_sheet_*.jpg` — visual QA sheets for preprocessing/crop review
            - `VALIDATION_REPORT.md` — full report with auto-metrics block

            See `docs/VALIDATION_REPORT.md` in the repo for the narrative.
          files: |
            ml/exports/model.onnx
            ml/exports/labels.json
            ml/exports/model_meta.json
            ml/exports/eval_metrics.json
            ml/exports/recognition_calibration.json
            ml/exports/capture_plan.md
            ml/exports/manifest_report.json
            ml/reports/contact_sheets/*.jpg
            docs/VALIDATION_REPORT.md
